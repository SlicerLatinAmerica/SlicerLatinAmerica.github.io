<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>
  <link rel="icon" type="image/x-icon" href="./public/assets/img/icon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous" />
  <link rel="stylesheet" type="text/css" href="./public/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <header class="md-viewer-header">
    <div class="container md-viewer-header-top">
      <a href="index.html"><img src="./public/assets/img/icon.svg" alt="3D Slicer for Latin America" /></a>
      <a href="javascript:history.back()" class="md-back-btn">← Back</a>
    </div>
  </header>

  <div class="md-body">
    <div id="md-error" class="md-error" hidden></div>
    <div id="md-content"></div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const filePath = params.get('file');
      const contentEl = document.getElementById('md-content');
      const errorEl = document.getElementById('md-error');

      if (!filePath) {
        errorEl.textContent = 'No file specified. Add ?file=path/to/file.md to the URL.';
        errorEl.hidden = false;
        return;
      }

      document.title = filePath.split('/').pop().replace('.md', '').replace(/_/g, ' ');

      try {
        const resp = await fetch(filePath);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        const base = filePath.substring(0, filePath.lastIndexOf('/') + 1);

        // Pre-process raw text: rewrite relative paths before marked parses
        // (images inside raw HTML divs are never tokenized by marked, so
        //  renderer.image would never fire for them)
        const escapedBase = base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        // Markdown image syntax: ![alt](relative.png)
        let mdProcessed = md.replace(/!\[([^\]]*)\]\((?!http|data:)([^)]+)\)/g,
          function(_, alt, path) { return '![' + alt + '](' + base + path + ')'; });
        // Raw HTML src="relative" attributes
        mdProcessed = mdProcessed.replace(/src="(?!http|data:|\/)([^"]+)"/g,
          function(_, path) { return 'src="' + base + path + '"'; });
        // Rewrite relative .md hrefs for links
        mdProcessed = mdProcessed.replace(/href="(?!http|#|\/)([^"]+\.md)"/g,
          function(_, path) { return 'href="md-viewer.html?file=' + encodeURIComponent(base + path) + '"'; });

        contentEl.innerHTML = marked.parse(mdProcessed, { html: true, breaks: true });

        // Post-process all elements with inline styles
        contentEl.querySelectorAll('[style]').forEach(function(el) {
          let s = el.getAttribute('style');
          // Clamp any hard pixel max-width so it never exceeds the viewport
          s = s.replace(/max-width\s*:\s*([0-9]+)px/g, 'max-width: min($1px, 100%)');
          // Scale down rem values - slide-export MDs are authored at 2x scale
          s = s.replace(/([0-9.]+)rem/g, function(_, n) { return (parseFloat(n) / 2) + 'rem'; });
          el.setAttribute('style', s);
        });

      } catch (e) {
        errorEl.textContent = 'Could not load file: ' + filePath;
        errorEl.hidden = false;
      }
    })();
  </script>
</body>
</html>
